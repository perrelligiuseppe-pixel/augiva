<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Augiva</title>
<link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #32323C;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

.wordmark {
  font-family: 'Italiana', serif;
  font-weight: 400;
  font-size: 96px;
  letter-spacing: 28px;
  text-indent: 28px;
  text-transform: uppercase;
  background: linear-gradient(180deg, #F4F4F5 0%, #6E6E73 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
</style>
</head>
<body>
  <div class="brand">
    <!-- Logo mark circolare -->
    <svg width="58" height="58" viewBox="0 0 58 58" fill="none">
      <circle cx="29" cy="29" r="27" stroke="url(#circleGrad)" stroke-width="1.2"/>
      <path d="M29 12 L41 46 H36.5 L29 24 L21.5 46 H17 L29 12Z" fill="url(#aGrad)"/>
      <line x1="21" y1="38" x2="37" y2="38" stroke="#32323C" stroke-width="2"/>
      <defs>
        <linearGradient id="circleGrad" x1="29" y1="2" x2="29" y2="56" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#F4F4F5"/>
          <stop offset="100%" stop-color="#6E6E73"/>
        </linearGradient>
        <linearGradient id="aGrad" x1="29" y1="12" x2="29" y2="46" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#F4F4F5"/>
          <stop offset="100%" stop-color="#6E6E73"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="wordmark">AUGIVA</div>
  </div>
</body>
</html>
